  * {
    margin: 0;

    font-family: sans-serif;
  }
  body {
    display: flex;
    background: #f5f5f5;
    overflow-x: hidden;
  }

  /* 左侧导航 */
  .sidebar {
    width: 90px;
    background: #333;
    height: 100vh;
    position: fixed;
    left: 0;
    top: 0;
    overflow-y: auto;
    z-index: 10;
  }
  .logo {
    padding: 20px 0;
    text-align: center;
    color: #fff;
    font-size: 14px;
    font-weight: bold;
    border-bottom: 1px solid #444;
  }
  .sidebar a {
    display: block;
    color: white;
    text-decoration: none;
    padding: 14px 6px;
    font-size: 13px;
    text-align: center;
  }
  .sidebar a:hover {
    background: #555;
  }

  /* 右侧 */
  .right-wrap {
    margin-left: 90px;
    flex: 1;
    width: calc(100% - 90px);
  }
  .banner {
    width: 100%;
    height: auto;
    max-height: 220px;
    object-fit: cover;
    display: block;
  }
  .content {
    padding: 15px;
  }
  .section {
    margin-bottom: 35px;
  }
  .section h2 {
    font-size: 18px;
    margin-bottom: 12px;
    border-left: 3px solid #333;
    padding-left: 10px;
  }

  /* 图片网格 不溢出 */
  .img-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    width: 100%;
  }
  .img-item {
    background: white;
    border-radius: 6px;
    overflow: hidden;
    cursor: zoom-in;
    width: 100%;
  }
  .img-item img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    display: block;
  }
  .img-item p {
    padding: 8px;
    text-align: center;
    font-size: 12px;
  }

  /* 弹窗放大 绝对不溢出 */
  .modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(0,0,0,0.95);
    z-index: 9999;
    align-items: center;
    justify-content: center;
    padding: 10px;
  }
  .modal img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    display: block;
  }
  .modal.show {
    display: flex;
  }
</style>
